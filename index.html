<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./fonts.css" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Unstop Labs</title>
  </head>
  <body>
    <header>
      <nav>
        <div class="nav-mobile">
          <span class="icon-hamburger"
            ><img src="/assets/icons/menu.png" alt=""
          /></span>
          <p class="brand-name">UNSTOP LABS</p>
        </div>
        <div class="nav-desktop">
          <div>
            <img class="logo" src="/assets/icons/logo.png" alt="" />
          </div>

          <ul class="container-link">
            <li class="link"><a href="#">About</a></li>
            <li class="link"><a href="#">Roadmap</a></li>
            <li class="link"><a href="#">Whitepaper</a></li>
            <li class="link"><a href="#">Docs</a></li>
          </ul>

          <div class="container-control">
            <ul class="container-social">
              <li>
                <img src="/assets/icons/twitter.png" alt="" />
              </li>
              <li>
                <img src="/assets/icons/discord.png" alt="" />
              </li>
              <li>
                <img src="/assets/icons/github.png" alt="" />
              </li>
            </ul>

            <button>
              <span class="text">Enter App</span>
              <span><img src="/assets/icons/arrow-right.png" alt="" /></span>
            </button>
          </div>
        </div>
      </nav>
    </header>

    <main>
      <section class="section-hero">
        <div class="intro">
          <span>
            <img class="logo" src="/assets/icons/logo.png" alt="" />
          </span>

          <div class="intro-text">
            <p class="brand-name">Unstop Labs</p>
            <p class="description m-0">
              <span class="part-first">The Intelligence Layer of </span
              ><span class="part-second">DE-SPACE</span>
            </p>
          </div>
        </div>

        <div class="container-link">
          <button>
            <span class="text">Enter App</span>
            <img src="/assets/icons/arrow-right.png" alt="" />
          </button>

          <a href="#">
            <span class="rectangle"></span>
            <span class="text">Whitepaper</span>
          </a>
        </div>

        <div class="info">
          <p class="info-date m-0">Mar 23, 2026</p>
          <p class="info-location m-0">27.7172, 85.3240</p>
        </div>

        <hr />
        <div class="data">
          <div class="data-info border-info-bottom">
            <img class="icon-star" src="/assets/icons/star.png" alt="" />
            <div>
              <p class="value">10,000</p>
              <p class="title">AI Data</p>
            </div>
          </div>

          <div class="data-info border-info-left border-info-bottom">
            <img class="icon-meter" src="/assets/icons/meter.png" alt="" />
            <div>
              <p class="value">5.4$/m</p>
              <p class="title">RPM</p>
            </div>
          </div>

          <div class="data-info border-info-left">
            <img class="icon-graph" src="/assets/icons/graph.png" alt="" />
            <div>
              <p class="value">20-1x-95</p>
              <p class="title">HEX</p>
            </div>
          </div>

          <div class="data-info border-info-left">
            <img class="icon-toggle" src="/assets/icons/toggle.png" alt="" />
            <div>
              <p class="value">ON</p>
              <p class="title">Active Status</p>
            </div>
          </div>
        </div>

        <hr />
      </section>

      <section class="info-partners">
        <p>Partnering with top Industry experts</p>

        <div class="partners">
          <div>
            <div class="opacity-4">
              <img src="/assets/icons/logo-coinbase.png" alt="" />
            </div>
            <div class="opacity-4">
              <img src="/assets/icons/logo-spotify.png" alt="" />
            </div>
            <div>
              <img src="/assets/icons/logo-slack.png" alt="" />
            </div>
            <div class="logo-dropbox">
              <img src="/assets/icons/logo-dropbox.png" alt="" />
            </div>
            <div class="opacity-4">
              <img src="/assets/icons/logo-webflow.png" alt="" />
            </div>
            <div class="opacity-4">
              <img src="/assets/icons/logo-zoom.png" alt="" />
            </div>
          </div>
        </div>
      </section>

      <section class="info-members">
        <div class="img-container">
          <img src="/assets/images/map-large.png" alt="" />
        </div>
      </section>

      <section class="app-overview">
        <p>App Overview</p>

        <div>
          <div class="img-container box-1">
            <img src="/assets/images/image-1.png" alt="" />
          </div>
          <div class="img-container box-2">
            <img src="/assets/images/image-5.png" alt="" />
          </div>
          <div class="img-container box-3">
            <img src="/assets/images/image-2.png" alt="" />
          </div>
          <div class="img-container box-4">
            <img src="/assets/images/image-4.png" alt="" />
          </div>
          <div class="img-container box-5">
            <img src="/assets/images/image-3.png" alt="" />
          </div>
        </div>
      </section>

      <section class="testimonials">
        <p>What people talk about</p>

        <div class="img-small">
          <img src="/assets/images/testimonials-mobile.png" alt="" />
        </div>

        <div class="img-large">
          <img src="/assets/images/testimonials-desktop.png" alt="" />
        </div>
      </section>
    </main>
  </body>
</html>
